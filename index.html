<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UPI QR Generator</title>
    <link rel="icon" href="fav_icon.png">
    

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background:linear-gradient(135deg,#ff9a9e,#fad0c4);
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .container{
            width:350px;
            background:#fff;
            padding:25px;
            border-radius:15px;
            box-shadow:0 5px 15px rgba(0,0,0,0.2);
            text-align:center;
        }

        h1{
            margin-bottom:20px;
            color:#333;
        }

        input{
            width:100%;
            padding:12px;
            margin:10px 0;
            border:1px solid #ccc;
            border-radius:8px;
            font-size:16px;
        }

        button{
            width:100%;
            padding:12px;
            background:#ff4b5c;
            color:white;
            border:none;
            border-radius:8px;
            font-size:16px;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            background:#e63946;
        }

        #qrBox{
            margin-top:20px;
            display:none;
        }

        #qrBox img{
            width:220px;
            height:220px;
            border:5px solid #eee;
            border-radius:10px;
        }

        .note{
            margin-top:10px;
            font-size:14px;
            color:#666;
        }
    </style>
</head>
<body>
    

    <div class="container">
        <h1>UPI QR Generator</h1>

        <input type="text" id="upiId" placeholder="Enter UPI ID">

        <input type="number" id="amount" placeholder="Enter Amount">

        <button onclick="generateQR()">Generate QR Code</button>

        <div id="qrBox">
            <img id="qrImage" src="qr.jpeg.jpeg" alt="QR Code">
            <p class="note">Scan & Pay</p>
        </div>
    </div>

    <script>
        function generateQR(){

            let upiId = document.getElementById("upiId").value;
            let amount = document.getElementById("amount").value;

            if(upiId === "abhinashkumarthakur@axl" || amount === ""){
                alert("Please enter UPI ID and Amount");
                return;
            }

            // UPI Payment Link
            let upiLink = `upi://pay?pa=${upiId}&pn=Payment&am=${amount}&cu=INR`;

            // QR API
            let qrURL = `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${encodeURIComponent(upiLink)}`;

            document.getElementById("qrImage").src = qrURL;
            document.getElementById("qrBox").style.display = "block";
        }
    </script>

</body>
</html>
